spring:
  application:
    name: roomwallah
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:roomwallah}
    username: ${DB_USER:roomwallah_user}
    password: ${DB_PASSWORD:roomwallah_secure_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSS'Z'
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.roomwallah: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: INFO

roomwallah:
  booking:
    instant-booking:
      enabled: false
    features:
      reminders-enabled: true
      expiry-enabled: true
      waitlist-enabled: true
    reminder:
      retry-delays: [1, 2, 4, 8, 16, 32]
      max-attempts: 6
    expiry:
      ttl-minutes: 30
  payment:
    payments-enabled: true
    escrow-enabled: true
    wallet-enabled: false
    disputes-enabled: true
    gateway:
      active-provider: ${PAYMENT_GATEWAY:STRIPE}
      stripe-secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
      razorpay-key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
      razorpay-key-secret: ${RAZORPAY_KEY_SECRET:rzp_test_secret_placeholder}
      cashfree-client-id: ${CASHFREE_CLIENT_ID:cf_test_placeholder}
      cashfree-client-secret: ${CASHFREE_CLIENT_SECRET:cf_test_secret_placeholder}
    webhook:
      stripe-secret: ${STRIPE_WEBHOOK_SECRET:whsec_stripe_placeholder}
      razorpay-secret: ${RAZORPAY_WEBHOOK_SECRET:whsec_razorpay_placeholder}
      cashfree-secret: ${CASHFREE_WEBHOOK_SECRET:whsec_cashfree_placeholder}

