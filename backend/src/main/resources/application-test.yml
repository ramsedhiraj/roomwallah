spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/roomwallah_test
    username: ${DB_USER:roomwallah_user}
    password: ${DB_PASSWORD:roomwallah_secure_pass}
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  flyway:
    enabled: false
  data:
    redis:
      repositories:
        enabled: false

logging:
  level:
    root: ERROR
    com.roomwallah: INFO
