version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: roomwallah-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-roomwallah}
      POSTGRES_USER: ${DB_USER:-roomwallah_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-roomwallah_secure_pass}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-roomwallah_user} -d $${POSTGRES_DB:-roomwallah}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
        reservations:
          memory: 256M
    networks:
      - roomwallah-network

  redis:
    image: redis:7-alpine
    container_name: roomwallah-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          memory: 128M
    networks:
      - roomwallah-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: roomwallah-backend
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${DB_NAME:-roomwallah}
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-roomwallah_user}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-roomwallah_secure_pass}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_signing_key_that_is_at_least_256_bits_long_for_security}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:-86400000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1500M
        reservations:
          memory: 512M
    networks:
      - roomwallah-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: roomwallah-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:${SERVER_PORT:-8080}/api/v1
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5173/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 64M
    networks:
      - roomwallah-network

volumes:
  postgres_data:
  redis_data:

networks:
  roomwallah-network:
    driver: bridge
