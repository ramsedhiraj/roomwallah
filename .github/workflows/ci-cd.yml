name: RoomWallah CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ${{ vars.DOCKER_REGISTRY || 'ghcr.io' }}
  BACKEND_IMAGE_NAME: ${{ vars.BACKEND_IMAGE_NAME || format('{0}/backend', github.repository) }}
  FRONTEND_IMAGE_NAME: ${{ vars.FRONTEND_IMAGE_NAME || format('{0}/frontend', github.repository) }}

jobs:
  validate-and-test:
    name: Validate and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: roomwallah_test
          POSTGRES_USER: roomwallah_user
          POSTGRES_PASSWORD: roomwallah_secure_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U roomwallah_user -d roomwallah_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-env

      # --- BACKEND VALIDATION ---
      - name: Backend Compile & Static Analysis
        run: |
          cd backend
          ./mvnw clean compile checkstyle:check pmd:check spotbugs:check

      - name: Run Backend Unit & Integration Tests
        run: |
          cd backend
          ./mvnw test
      # --- FRONTEND VALIDATION ---
      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Frontend Lint & Build
        run: |
          cd frontend
          npm run lint
          npm run build

      # --- END-TO-END TESTING ---
      - name: Install Playwright Browsers
        run: |
          npx playwright install --with-deps

      - name: Run Playwright E2E Tests
        run: |
          # Verify Playwright tests compile and run if present
          if [ -d "playwright/e2e" ]; then
            npx playwright test
          else
            echo "No Playwright E2E tests directory found, skipping."
          fi

      # --- PUBLISH TEST REPORTS ---
      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            backend/target/surefire-reports/
            backend/target/checkstyle-result.xml
            backend/target/pmd.xml
            backend/target/spotbugsXml.xml
            frontend/dist/
          retention-days: 7

  build-and-package:
    name: Build & Dockerize
    needs: validate-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Build Environment
        uses: ./.github/actions/setup-env

      - name: Build Backend Executable JAR
        run: |
          cd backend
          ./mvnw package -DskipTests

      - name: Build Frontend Assets
        run: |
          cd frontend
          npm ci
          npm run build

      # --- DOCKER IMAGES GENERATION ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Build Metadata
        id: meta
        run: |
          echo "sha_tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "semver_tag=1.0.0" >> $GITHUB_OUTPUT

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ steps.meta.outputs.sha_tag }}
            ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ steps.meta.outputs.semver_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.meta.outputs.sha_tag }}
            ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.meta.outputs.semver_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- SECURITY SCANNING ---
      - name: Scan Backend Image for Vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ steps.meta.outputs.sha_tag }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Scan Frontend Image for Vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.meta.outputs.sha_tag }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-package
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Pull Staging Images & Restart
        run: |
          echo "Simulating Staging Pull and Deployment of tagged release..."
          echo "Deploying ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }} to staging environment..."
          echo "Deploying ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }} to staging environment..."
          echo "Staging Deployment Completed."

      - name: Run Staging Smoke Checks
        run: |
          echo "Executing staging availability checks..."
          # Mock smoke test: curl health endpoint (would be staged endpoint)
          echo "Availability check response code: 200 OK"

  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    # Enforces manual approval gate configured in GitHub Environment permissions
    environment: production
    steps:
      - name: Pull Production Images & Restart
        run: |
          echo "Simulating Production Pull and Deployment..."
          echo "Deploying ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }} to production environment..."
          echo "Deploying ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }} to production environment..."
          echo "Production Deployment Completed."

      - name: Verify Health Check Status
        run: |
          echo "Verifying production health check status..."
          echo "Production deployment health verified successfully."
